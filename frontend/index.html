<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clo-clo t'es là</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>Clo-clo, t'es là ?</h1>
            <p id="status">Prêt</p>
        </header>

        <button id="ptt" type="button" aria-label="Appuyer pour parler">
            <span class="ptt-label">Appuyer pour parler</span>
        </button>

        <section id="transcript" aria-live="polite">
            <div id="user-bubble" class="bubble user hidden"></div>
            <div id="claude-bubble" class="bubble claude hidden"></div>
        </section>

        <footer>
            <button id="reset" type="button">Nouvelle conversation</button>
        </footer>
    </main>
    <script src="app.js"></script>
</body>
</html>
